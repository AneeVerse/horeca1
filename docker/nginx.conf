# ── HTTP (port 80) ─────────────────────────────────────────────────────────
# Two roles:
#   1. ACME challenge for Let's Encrypt cert renewals (must stay on port 80).
#   2. Permanent redirect of all other traffic to HTTPS so visitors never
#      land on plaintext. The catch-all server_name (`_`) means hits to the
#      bare IP (64.227.187.210) also redirect to freshville.store via Host.
server {
    listen 80;
    server_name freshville.store www.freshville.store 64.227.187.210 _;

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://freshville.store$request_uri;
    }
}

# ── HTTPS (port 443) ───────────────────────────────────────────────────────
# Primary server block. server_name carries both apex and www so the SAN
# cert (issued for both names) matches without browser warnings.
server {
    listen 443 ssl;
    http2 on;
    server_name freshville.store www.freshville.store;

    ssl_certificate     /etc/letsencrypt/live/freshville.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/freshville.store/privkey.pem;

    # Modern TLS — drop SSLv3/TLS1.0/1.1, which are insecure and Razorpay
    # / browsers don't need anymore.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Re-resolve upstream via Docker DNS so container restarts (new IP) do not break us
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_app app:3000;

    # Auth.js JWT session cookies are large (permissions + RBAC context).
    # Without these, Nginx returns 502 "upstream sent too big header" on login.
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # Razorpay webhooks + image uploads can be a few MB.
    client_max_body_size       25m;

    location / {
        proxy_pass http://$upstream_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
