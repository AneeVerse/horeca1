# Local development: PostgreSQL + Redis
# Usage: docker compose -f docker/docker-compose.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: horeca1-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: horeca1
      POSTGRES_PASSWORD: horeca1_dev
      POSTGRES_DB: horeca1
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horeca1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: horeca1-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
