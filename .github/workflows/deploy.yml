# Build the production image on GitHub's runners (fast + cached), push to GHCR,
# then SSH to the droplet to pull the SHA-pinned image + migrate + restart.
# Deploys go from ~6 min (on-droplet build) to ~40s, never starve the droplet CPU,
# and can't run stale code (image is pinned to the commit SHA).
#
# Uses the EXISTING `DO_SSH_PRIVATE_KEY` secret (no new secret needed). The image
# is published under this repo's owner's GHCR namespace, and the droplet pulls it
# using the workflow's own ephemeral token — no long-lived registry creds stored.

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: false

env:
  # Resolves to ghcr.io/<owner>/horeca1 for whichever repo runs this.
  IMAGE: ghcr.io/${{ github.repository_owner }}/horeca1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: worker
          push: true
          tags: |
            ${{ env.IMAGE }}-worker:latest
            ${{ env.IMAGE }}-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Check deploy secret
        id: check
        env:
          KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DO_SSH_PRIVATE_KEY not set — image built & pushed, auto-deploy skipped."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH (pull SHA-pinned image)
        if: steps.check.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: 64.227.187.210
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: GHCR_TOKEN,GHCR_USER,DEPLOY_IMAGE,DEPLOY_SHA
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export DEPLOY_IMAGE DEPLOY_SHA
            cd /opt/horeca1
            bash deploy.sh
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DEPLOY_IMAGE: ${{ env.IMAGE }}
          DEPLOY_SHA: ${{ github.sha }}
