# Build the production image on GitHub's runners (fast + cached) and push to GHCR,
# then SSH to the droplet to pull + migrate + restart. This moves the slow
# `next build` OFF the $29 droplet, cutting deploys from ~6 min to ~30–60s.
#
# One-time setup (repo → Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY  – private key whose public key is in the droplet's authorized_keys
#   DEPLOY_HOST      – 64.227.187.210   (or set as a Variable)
#   DEPLOY_USER      – root
# Until SSH_PRIVATE_KEY is set, the image still builds + pushes; the deploy step is skipped.

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/team-horeca1/horeca1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: worker
          push: true
          tags: |
            ${{ env.IMAGE }}-worker:latest
            ${{ env.IMAGE }}-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Check deploy secret
        id: check
        env:
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SSH_PRIVATE_KEY not set — image built & pushed, but auto-deploy skipped. Add the secret to enable it."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.check.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER || 'root' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: GHCR_TOKEN,GHCR_USER,GIT_SHA
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/horeca1
            GIT_SHA="$GIT_SHA" bash deploy.sh
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GIT_SHA: ${{ github.sha }}
