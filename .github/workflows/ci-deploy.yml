name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Type check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  deploy:
    name: Deploy to production
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: 64.227.187.210
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          known_hosts: |
            |1|ECHv3/cxWTSFgSDTJuUm02GCJ8A=|CTDQ2VDxCXtoZdFwEON6VqXzEEs= ssh-rsa 
            |1|L9ethBecUPwFY9XBhBnvbG1W/No=|hGr3yWEHeJb6RjiLIh4BYUzLTGk= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBCbD1Siht1V/x1GNCw9dwtx8QtO1HNvrHIwhioGOe7yR6+jP7apYOJpB6bVjIkVGjcPe/wQfpqGFeeZwsyjAn8Q=
